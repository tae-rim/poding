# Pod-ing 커스텀 Falco 룰
# k, n 상태 탐지용

# k: 컨테이너 내부에서 K8s API 접근 (wget/curl로 kubernetes.default.svc 접근)
- rule: Pod-ing K8s API Access from Container
  desc: Detect container accessing Kubernetes API server via wget/curl
  condition: >
    spawned_process and container and
    (proc.name in (wget, curl) and
    proc.cmdline contains "kubernetes.default")
  output: >
    K8s API accessed from container
    (proc_cmdline=%proc.cmdline pod_name=%k8s.pod.name ns=%k8s.ns.name container=%container.name)
  priority: WARNING
  tags: [poding, k8s_api, container]

# k: 컨테이너 내부에서 SA 토큰 읽기
- rule: Pod-ing SA Token Read
  desc: Detect reading ServiceAccount token in container
  condition: >
    open_read and container and
    fd.name startswith /var/run/secrets/kubernetes.io/serviceaccount
  output: >
    SA token read in container
    (file=%fd.name proc_cmdline=%proc.cmdline pod_name=%k8s.pod.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [poding, credential_access, container]

# n: 컨테이너 내부에서 nc/ncat 실행 (옵션 무관)
- rule: Pod-ing Netcat Execution in Container
  desc: Detect any netcat execution in container
  condition: >
    spawned_process and container and
    proc.name in (nc, ncat, netcat)
  output: >
    Netcat executed in container
    (proc_cmdline=%proc.cmdline pod_name=%k8s.pod.name ns=%k8s.ns.name container=%container.name)
  priority: WARNING
  tags: [poding, network_tool, container]

# n: 컨테이너 내부에서 wget/curl로 외부 접속 (K8s API 제외)
- rule: Pod-ing External Download in Container
  desc: Detect wget/curl to external targets in container
  condition: >
    spawned_process and container and
    proc.name in (wget, curl) and
    not proc.cmdline contains "kubernetes.default"
  output: >
    External download tool used in container
    (proc_cmdline=%proc.cmdline pod_name=%k8s.pod.name ns=%k8s.ns.name container=%container.name)
  priority: NOTICE
  tags: [poding, network_tool, container]
